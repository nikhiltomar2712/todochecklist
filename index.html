<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TaskFlow — A clean, minimal to-do list app" />
  <title>TaskFlow — To-Do</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background orbs -->
  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>

  <div class="app-wrapper">
    <main class="app-container" role="main">

      <!-- ── Header ─────────────────────────────── -->
      <header class="app-header">
        <div class="header-top">
          <div class="logo">
            <span class="logo-icon" aria-hidden="true">✦</span>
            <h1 class="logo-title">TaskFlow</h1>
          </div>
          <!-- Live stats pill -->
          <div class="stats-pill" aria-live="polite" aria-label="Task progress">
            <span class="stats-completed" id="statsCompleted">0</span>
            <span class="stats-divider" aria-hidden="true">/</span>
            <span class="stats-total" id="statsTotal">0</span>
          </div>
        </div>
        <p class="header-subtitle">Stay focused, get it done.</p>
      </header>

      <!-- ── Task Input ──────────────────────────── -->
      <section class="input-section" aria-label="Add new task">
        <div class="input-wrapper">
          <input
            type="text"
            id="taskInput"
            class="task-input"
            placeholder="What needs to be done?"
            autocomplete="off"
            autocapitalize="sentences"
            maxlength="200"
            aria-label="New task text"
          />
          <button class="add-btn" id="addBtn" aria-label="Add task">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <p class="input-hint" id="charCount" aria-live="polite"></p>
      </section>

      <!-- ── Filter Tabs ─────────────────────────── -->
      <nav class="filter-tabs" aria-label="Filter tasks" role="tablist">
        <button class="filter-tab active" data-filter="all"       role="tab" aria-selected="true">All</button>
        <button class="filter-tab"        data-filter="active"    role="tab" aria-selected="false">Active</button>
        <button class="filter-tab"        data-filter="completed" role="tab" aria-selected="false">Completed</button>
      </nav>

      <!-- ── Task List ───────────────────────────── -->
      <section class="task-section" aria-label="Task list">
        <ul class="task-list" id="taskList" aria-live="polite">
          <!-- Populated by script.js -->
        </ul>

        <!-- Empty state (shown when no tasks match filter) -->
        <div class="empty-state" id="emptyState" role="status" aria-live="polite">
          <div class="empty-icon" aria-hidden="true">◎</div>
          <p class="empty-title">All clear!</p>
          <p class="empty-sub">Add a task above to get started.</p>
        </div>
      </section>

      <!-- ── Footer ─────────────────────────────── -->
      <footer class="app-footer" aria-label="Task summary">
        <span class="footer-count" id="footerCount" aria-live="polite">0 tasks remaining</span>
        <button class="clear-btn" id="clearBtn" disabled>Clear completed</button>
      </footer>

    </main>
  </div>

  <!-- Toast notification (injected by JS) -->

  <script src="script.js"></script>
</body>
</html>
